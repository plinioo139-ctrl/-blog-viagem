<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Meu Blog de Viagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body, html {
            height: 100%;
        }
        /* Foto de viagem em tela cheia no fundo */
        .bg-viagem {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://picsum.photos/1920/1080?travel');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100%;
        }
        /* Caixa de login semi-transparente e moderna */
        .card-login {
            border: none;
            border-radius: 1.5rem;
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px); /* Efeito de vidro desfocado ao fundo */
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-viagem d-flex align-items-center justify-content-center">

    <div class="container p-3 d-flex justify-content-center">
        <div class="card card-login shadow-lg p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3 shadow">
                    <i class="bi bi-compass" style="font-size: 2rem;"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">Área Restrita</h3>
                <p class="text-muted small">Faça login para gerenciar o seu blog</p>
            </div>

            <div id="erro-alert" class="alert alert-danger d-none text-center py-2 small" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuário ou senha incorretos!
            </div>

            <form id="formLogin">
                <div class="mb-3">
                    <label for="usuario" class="form-label small fw-bold text-secondary">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0" id="usuario" placeholder="Seu usuário" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label small fw-bold text-secondary">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0" id="senha" placeholder="Sua senha" required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg shadow rounded-3 fw-bold fs-6">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Acessar Blog
                    </button>
                </div>
            </form>
        </div>
    </div>

<script>
    document.getElementById('formLogin').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const usuario = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;
        const erroAlert = document.getElementById('erro-alert');

        // Validação exclusiva
        if (usuario === 'meublog' && senha === 'viagem2026') {
            localStorage.setItem('logado', 'true');
            window.location.href = 'index.html';
        } else {
            erroAlert.classList.remove('d-none');
            document.getElementById('senha').value = ''; // Limpa o campo da senha por segurança
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
